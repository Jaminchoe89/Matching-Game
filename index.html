<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapping Growth Opportunities</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,600;8..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260430k" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-card">
        <section class="game-overlay" id="game-overlay" aria-live="polite">
          <div class="overlay-panel">
            <img
              id="overlay-logo"
              class="overlay-logo"
              src="./1x/Logo White.png"
              alt="Logo"
            />
            <p id="overlay-message" class="overlay-message" hidden></p>
            <p id="overlay-instructions" class="overlay-instructions">
              Flip two cards at a time and match cards with the same image. Clear as many as you can before the 30-second timer runs out.
            </p>
            <button id="overlay-button" class="primary-button" type="button">
              Start
            </button>
          </div>
        </section>

        <div class="playfield">
          <header class="hud">
            <h2>Mapping Growth Opportunities</h2>

            <div class="timer-ring" aria-live="polite">
              <strong id="timer">30</strong>
            </div>
          </header>

          <section
            class="game-board"
            id="game-board"
            aria-label="Memory card board"
          ></section>
        </div>
      </section>
    </main>

    <template id="card-template">
      <button class="memory-card" type="button">
        <span class="card-face card-front"></span>
        <span class="card-face card-back"></span>
      </button>
    </template>

    <script src="./script.js?v=20260430i"></script>
  </body>
</html>
